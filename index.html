<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Master Plan">
<meta name="theme-color" content="#090909">
<title>Master Plan</title>

<style>
:root{
  --bg:#090909;--bg2:#111;--bg3:#181818;--bg4:#202020;
  --border:#222;--border2:#2a2a2a;
  --accent:#e8ff57;--blue:#57d8ff;--orange:#ff7b57;
  --green:#4aff7a;--purple:#c157ff;--gold:#ffaa00;--red:#ff5757;
  --text:#f0f0f0;--text2:#aaa;--muted:#666;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.inner{padding:0 16px 28px;max-width:600px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* NAV */
.nav{display:grid;grid-template-columns:repeat(3,1fr);background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:var(--safe-b);flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:56px;transition:color .15s}
.nb.active{color:var(--accent)}
.nb svg{width:20px;height:20px;margin-bottom:3px}
.nb-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase}

/* SHARED */
.page-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:40px;letter-spacing:3px;padding-top:20px;margin-bottom:4px}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin:22px 0 10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid}
.tag-push{color:var(--accent);border-color:var(--accent);background:#1a1f0a}
.tag-pull{color:var(--blue);border-color:var(--blue);background:#0d1a1a}
.tag-squat{color:var(--purple);border-color:var(--purple);background:#1a0d1f}
.tag-hinge{color:var(--orange);border-color:var(--orange);background:#1a0d0a}
.tag-opt{color:var(--gold);border-color:var(--gold);background:#1a1500}
.pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--text2);letter-spacing:1px}
.pill em{color:var(--accent);font-style:normal;font-weight:600}

/* TODAY */
.today-top{display:flex;justify-content:space-between;align-items:flex-start;padding-top:18px;margin-bottom:8px}
.t-day{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.t-date{font-size:12px;color:var(--text2)}
.s-name{font-family:'Impact','Arial Narrow',sans-serif;font-size:56px;letter-spacing:3px;line-height:1;margin:6px 0 4px}
.s-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.s-dur{font-size:12px;color:var(--muted)}
.s-done-badge{font-size:12px;color:var(--green);font-weight:600}

.warmup-bar{background:#0a1515;border:1px solid #1a3535;border-left:3px solid var(--blue);border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:12px;color:#6aafaf;line-height:1.7}
.warmup-bar strong{color:var(--blue);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;font-weight:500}

.pu-card{background:#141a08;border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.pu-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
.pu-val{font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);line-height:1}
.pu-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* EXERCISE CARDS */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.ex-card.done{border-color:#1e3a1a;background:#0c140a}
.ex-card.expanded{border-color:var(--accent)}
.ex-hdr{display:flex;align-items:center;padding:12px 14px;gap:11px;cursor:pointer;user-select:none}
.ex-hdr:active{background:var(--bg3)}
.ex-cb{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ex-card.done .ex-cb{background:var(--accent);border-color:var(--accent)}
.ex-cb-icon{display:none}
.ex-card.done .ex-cb-icon{display:block}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-card.done .ex-name{color:var(--muted);text-decoration:line-through}
.ex-meta{font-size:11px;color:var(--muted);margin-top:1px}
.ex-prev{text-align:right;flex-shrink:0;min-width:52px}
.ex-prev-val{font-family:'Impact','Arial Narrow',sans-serif;font-size:17px;color:var(--text2);line-height:1}
.ex-prev-lbl{font-size:9px;color:var(--muted);letter-spacing:1px}
.ex-chev{color:var(--muted);font-size:12px;flex-shrink:0;transition:transform .2s;margin-left:4px}
.ex-card.expanded .ex-chev{transform:rotate(180deg);color:var(--accent)}

/* SET LOGGER */
.ex-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.ex-card.expanded .ex-body{display:block}
.prev-hint{font-size:11px;color:var(--muted);background:var(--bg3);border-radius:6px;padding:7px 10px;margin-bottom:10px;line-height:1.5}
.prev-hint strong{color:var(--text2)}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.set-num{font-size:11px;color:var(--muted);width:26px;flex-shrink:0;text-align:center}
.set-w-input{flex:1.2;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 4px;font-family:'Impact','Arial Narrow',sans-serif;font-size:20px;color:var(--accent);text-align:center;outline:none;-webkit-appearance:none;appearance:none;min-width:0;transition:border-color .15s}
.set-r-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 4px;font-family:'Impact','Arial Narrow',sans-serif;font-size:20px;color:var(--text2);text-align:center;outline:none;-webkit-appearance:none;appearance:none;min-width:0;transition:border-color .15s}
.set-w-input:focus,.set-r-input:focus{border-color:var(--accent)}
.set-x{font-size:14px;color:var(--muted);flex-shrink:0}
.set-kg{font-size:10px;color:var(--muted);flex-shrink:0}
.set-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-del:active{color:var(--red);border-color:var(--red)}
.add-set-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
.add-set-btn:active{border-color:var(--accent);color:var(--accent)}
.ex-mark-btn{width:100%;padding:11px;border-radius:8px;border:none;font-family:'Impact','Arial Narrow',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;margin-top:10px}
.ex-mark-btn:active{opacity:.8}
.ex-mark-btn.mark{background:var(--accent);color:#000}
.ex-mark-btn.unmark{background:#1a2a14;color:var(--accent);border:1px solid var(--accent)}

.session-btn{width:100%;padding:18px;border-radius:14px;font-family:'Impact','Arial Narrow',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;border:none;margin-top:14px}
.session-btn:active{opacity:.8}
.session-btn.go{background:var(--accent);color:#000}
.session-btn.logged{background:#1a2a14;color:var(--accent);border:1px solid var(--accent)}

.big-state{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px 20px;text-align:center;margin:16px 0}
.bs-icon{font-size:52px;margin-bottom:12px}
.bs-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:38px;letter-spacing:3px}
.bs-title.blue{color:var(--blue)}.bs-title.dim{color:var(--muted)}
.bs-sub{font-size:13px;color:var(--text2);margin-top:10px;line-height:1.7}

/* PLAN */
.prog-block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.prog-hdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.prog-hdr:active{background:var(--bg3)}
.prog-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px}
.prog-sub-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.prog-hdr-r{display:flex;align-items:center;gap:10px}
.chev{color:var(--muted);font-size:13px;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.prog-body{display:none;border-top:1px solid var(--border)}
.prog-body.open{display:block}
.prog-wb{padding:10px 16px;font-size:11px;line-height:1.6;border-bottom:1px solid var(--border)}
.prog-wb.blue{background:#081414;color:#5a9a9a}
.prog-wb.dim{background:#0d0d0d;color:var(--muted)}
.ex-tbl{width:100%;border-collapse:collapse}
.ex-tbl th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:9px 16px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.ex-tbl td{padding:9px 16px;border-bottom:1px solid #131313;font-size:12px;color:var(--text2)}
.ex-tbl tr:last-child td{border-bottom:none}
.ex-tbl td:first-child{color:var(--text);font-weight:500}
.ex-tbl .tw{color:var(--accent);font-family:'Impact','Arial Narrow',sans-serif;font-size:15px}
.ex-tbl .tr{color:var(--blue);font-size:11px}

/* LOG TAB */
.bw-row{display:flex;gap:10px;margin-bottom:10px}
.bw-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'Impact','Arial Narrow',sans-serif;font-size:26px;color:var(--accent);text-align:center;outline:none;-webkit-appearance:none;appearance:none}
.bw-inp:focus{border-color:var(--accent)}
.sv-btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:14px 18px;font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;flex-shrink:0}
.sv-btn:active{opacity:.8}
.bw-entries{display:flex;flex-direction:column;gap:6px}
.bw-row-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.bw-row-date{font-size:12px;color:var(--text2)}
.bw-row-val{font-family:'Impact','Arial Narrow',sans-serif;font-size:20px;color:var(--accent)}
.bw-row-chg{font-size:11px}
.chg-down{color:var(--green)}.chg-up{color:var(--orange)}.chg-same{color:var(--muted)}

.lift-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.lpill{padding:7px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.lpill.active{background:#1a1f0a;border-color:var(--accent);color:var(--accent)}
.lift-hist-tbl{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.lh-hdr{display:grid;grid-template-columns:52px 1fr 80px 60px;border-bottom:1px solid var(--border)}
.lh-hdr span{padding:9px 12px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500}
.lh-row{display:grid;grid-template-columns:52px 1fr 80px 60px;border-bottom:1px solid #131313}
.lh-row:last-child{border-bottom:none}
.lh-row span{padding:10px 12px;font-size:12px;color:var(--text2)}
.lh-row span:first-child{color:var(--text);font-weight:500}
.lh-best{color:var(--accent);font-family:'Impact','Arial Narrow',sans-serif;font-size:16px}
.lh-row.this-wk{background:#141a08}
.pr-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin-left:6px;vertical-align:middle}

/* CHART */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.chart-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
.chart-wrap canvas{width:100%;display:block}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--accent);color:#000;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="scroll" id="scroll">
    <div class="page active" id="page-today"><div class="inner" id="today-inner"></div></div>
    <div class="page" id="page-plan"><div class="inner" id="plan-inner"></div></div>
    <div class="page" id="page-log"><div class="inner" id="log-inner"></div></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="goPage('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="nb-lbl">Today</span>
    </button>
    <button class="nb" onclick="goPage('plan')" id="nav-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span class="nb-lbl">Plan</span>
    </button>
    <button class="nb" onclick="goPage('log')" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      <span class="nb-lbl">Log</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const PROG_START = new Date('2026-05-11T00:00:00');

const PULLUPS = [
  {main:'1×2',band:'+3×5 band'},{main:'2×2',band:'+2×5 band'},
  {main:'2×3',band:'+2×5 band'},{main:'3×3',band:'+1×5 band'},
  {main:'3×4',band:'+1×4 band'},{main:'4×4',band:'no band'},
  {main:'4×6+',band:'✓ goal'}
];

const REST = {
  bench:'2–3 min',incline:'90 sec',ohp:'2 min',cablefly:'90 sec',
  lateral:'60 sec',pushdown:'90 sec',
  squat:'2–3 min',rdl:'2 min',lunge:'90 sec',legcurl:'90 sec',calf:'60 sec',
  row:'2–3 min',pullup:'2 min',incrow:'90 sec',facepull:'60 sec',curl:'90 sec',
  deadlift:'3 min',legpress:'2 min',hipthrust:'90 sec',wlunge:'90 sec',legraise:'60 sec',
  bonusfly:'90 sec',bonuscurl:'90 sec',bonuslat:'60 sec',bonuslr:'60 sec'
};

const SESSIONS = {
  upperA:{
    name:'UPPER A',tag:'push',tagLabel:'Push',day:'Monday',duration:'65–70 min',warmup:true,
    exercises:[
      {key:'bench',    name:'Barbell Bench Press',  sets:'4',reps:'8',       dw:40,  unit:'kg'},
      {key:'incline',  name:'Incline DB Press',      sets:'3',reps:'10',      dw:12.5,unit:'kg/side'},
      {key:'ohp',      name:'DB Overhead Press',     sets:'3',reps:'10',      dw:12.5,unit:'kg/side'},
      {key:'cablefly', name:'Cable Fly',              sets:'3',reps:'15',      dw:10,  unit:'kg/side'},
      {key:'lateral',  name:'DB Lateral Raises',     sets:'3',reps:'15',      dw:7.5, unit:'kg'},
      {key:'pushdown', name:'Tricep Pushdown',        sets:'3',reps:'12',      dw:10.9,unit:'kg'},
    ]
  },
  lowerA:{
    name:'LOWER A',tag:'squat',tagLabel:'Squat',day:'Tuesday',duration:'60–65 min',warmup:false,
    exercises:[
      {key:'squat',   name:'Barbell Back Squat',  sets:'4',reps:'8',       dw:30, unit:'kg'},
      {key:'rdl',     name:'Romanian Deadlift',   sets:'3',reps:'10',      dw:25, unit:'kg'},
      {key:'lunge',   name:'DB Reverse Lunge',    sets:'3',reps:'10 each', dw:8,  unit:'kg'},
      {key:'legcurl', name:'Leg Curl',             sets:'3',reps:'12',      dw:0,  unit:'kg', noW:true, label:'test W1'},
      {key:'calf',    name:'Calf Raises',          sets:'4',reps:'15',      dw:0,  unit:'', noW:true,  label:'BW+DB'},
    ]
  },
  upperB:{
    name:'UPPER B',tag:'pull',tagLabel:'Pull',day:'Thursday',duration:'60–65 min',warmup:true,pullups:true,
    exercises:[
      {key:'row',      name:'Barbell Row',       sets:'4',reps:'8',  dw:30, unit:'kg'},
      {key:'incrow',   name:'DB Incline Row',    sets:'3',reps:'10', dw:12, unit:'kg'},
      {key:'facepull', name:'Face Pull (band)',  sets:'3',reps:'15', dw:0,  unit:'', noW:true, label:'med band'},
      {key:'curl',     name:'Barbell Curl',      sets:'3',reps:'12', dw:20, unit:'kg'},
    ]
  },
  lowerB:{
    name:'LOWER B',tag:'hinge',tagLabel:'Hinge',day:'Friday',duration:'65–70 min',warmup:false,
    exercises:[
      {key:'deadlift', name:'Conventional Deadlift', sets:'4',reps:'5',       dw:50, unit:'kg'},
      {key:'legpress', name:'Leg Press',              sets:'4',reps:'12',      dw:0,  unit:'kg', noW:true, label:'test W1'},
      {key:'hipthrust',name:'Hip Thrust',             sets:'3',reps:'12',      dw:30, unit:'kg'},
      {key:'wlunge',   name:'Walking Lunges',         sets:'3',reps:'12 each', dw:0,  unit:'', noW:true,  label:'BW'},
      {key:'legraise', name:'Hanging Leg Raise',      sets:'3',reps:'15',      dw:0,  unit:'', noW:true,  label:'BW'},
    ]
  },
  optional:{
    name:'BONUS',tag:'opt',tagLabel:'Optional',day:'Saturday',duration:'30–40 min',warmup:false,
    exercises:[
      {key:'bonusfly',  name:'Cable Fly',        sets:'3',reps:'15', dw:10, unit:'kg/side'},
      {key:'bonuscurl', name:'Barbell Curl',     sets:'3',reps:'12', dw:20, unit:'kg'},
      {key:'bonuslat',  name:'Lateral Raises',   sets:'3',reps:'15', dw:7.5,unit:'kg'},
      {key:'bonuslr',   name:'Hanging Leg Raise',sets:'3',reps:'15', dw:0,  unit:'', noW:true, label:'BW'},
    ]
  }
};

const DAY_MAP = {1:'upperA',2:'lowerA',4:'upperB',5:'lowerB',6:'optional'};

const TRACKED_LIFTS = [
  {key:'bench',   name:'Bench Press',    session:'Upper A', start:40,  target:52.5},
  {key:'incline', name:'Incline DB',     session:'Upper A', start:12.5,target:25},
  {key:'ohp',     name:'OHP',            session:'Upper A', start:12.5,target:22.5},
  {key:'squat',   name:'Back Squat',     session:'Lower A', start:30,  target:57.5},
  {key:'deadlift',name:'Deadlift',       session:'Lower B', start:50,  target:72.5},
  {key:'row',     name:'Barbell Row',    session:'Upper B', start:30,  target:50},
  {key:'rdl',     name:'Romanian DL',   session:'Lower A', start:25,  target:45},
  {key:'curl',    name:'Barbell Curl',   session:'Upper B', start:20,  target:35},
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
// mp_logs  : { "YYYY-MM-DD": { exKey: [{w,r},...] } }
// mp_done  : { "YYYY-MM-DD_sessionKey": true }
// mp_exdone: { "YYYY-MM-DD_exKey": true }
// mp_bw    : { "YYYY-MM-DD": kg }

let L = {logs:{}, done:{}, exdone:{}, bw:{}};

function loadState(){
  ['logs','done','exdone','bw'].forEach(k=>{
    try{L[k]=JSON.parse(localStorage.getItem('mp2_'+k)||'{}');}catch(e){L[k]={};}
  });
}
function save(k){ try{localStorage.setItem('mp2_'+k,JSON.stringify(L[k]));}catch(e){} }

// Pre-populate Week 1 Upper A from the user's log
function seedDay1(){
  const d='2026-05-11';
  if(L.logs[d] && L.logs[d]['bench']) return; // already seeded
  L.logs[d] = {
    bench:   [{w:30,r:1},{w:40,r:1},{w:40,r:6},{w:40,r:6}],
    incline: [{w:12.5,r:7},{w:12.5,r:7},{w:10,r:10}],
    ohp:     [{w:12.5,r:10},{w:12.5,r:10},{w:12.5,r:6}],
    cablefly:[{w:10.9,r:15},{w:10.9,r:15},{w:7.9,r:15}],
    lateral: [{w:7.5,r:15},{w:7.5,r:15},{w:7.5,r:15}],
    pushdown:[{w:10.9,r:12},{w:10.9,r:12},{w:7.8,r:12}],
  };
  L.done[d+'_upperA'] = true;
  ['bench','incline','ohp','cablefly','lateral','pushdown'].forEach(k=>{ L.exdone[d+'_'+k]=true; });
  save('logs'); save('done'); save('exdone');
}

// HELPERS
// ══════════════════════════════════════════════
function dStr(d){ d=d||new Date(); return d.toISOString().split('T')[0]; }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function weekNum(){
  const t=today(), s=new Date(PROG_START); s.setHours(0,0,0,0);
  if(t<s) return 0;
  return Math.min(Math.floor((t-s)/86400000/7)+1,7);
}
function getDow(){ return new Date().getDay(); }
function getTodaySessionKey(){ return DAY_MAP[getDow()]||null; }
function getTodaySessId(){ const sk=getTodaySessionKey(); return sk?dStr()+'_'+sk:null; }
function isSessDone(){ const id=getTodaySessId(); return id?!!L.done[id]:false; }
function isExDone(key){ return !!L.exdone[dStr()+'_'+key]; }

function getSets(dateStr, exKey){
  return (L.logs[dateStr]&&L.logs[dateStr][exKey]) ? L.logs[dateStr][exKey] : null;
}
function setSets(dateStr, exKey, sets){
  if(!L.logs[dateStr]) L.logs[dateStr]={};
  L.logs[dateStr][exKey]=sets;
  save('logs');
}

function getPrevSets(exKey){
  // Find most recent date before today with data for this key
  const todayS = dStr();
  const dates = Object.keys(L.logs).filter(d=>d<todayS).sort().reverse();
  for(const d of dates){
    if(L.logs[d][exKey] && L.logs[d][exKey].length>0) return {date:d, sets:L.logs[d][exKey]};
  }
  return null;
}

function bestSet(sets){
  if(!sets||!sets.length) return null;
  return sets.reduce((best,s)=>(s.w>best.w||(s.w===best.w&&s.r>best.r))?s:best, sets[0]);
}

function fmtDate(ds){
  const d=new Date(ds+'T00:00:00');
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+mo[d.getMonth()];
}

function weekOfDate(ds){
  const d=new Date(ds+'T00:00:00'); d.setHours(0,0,0,0);
  const s=new Date(PROG_START); s.setHours(0,0,0,0);
  if(d<s) return 0;
  return Math.min(Math.floor((d-s)/86400000/7)+1,7);
}

function buildExCard(ex, sk, sessDone){
  const todayS=dStr(), exDone=isExDone(ex.key);
  const isExpanded=expandedEx===ex.key;
  const prev=getPrevSets(ex.key);
  const todaySets=getSets(todayS,ex.key)||[];
  const bs=prev?bestSet(prev.sets):null;
  const prevLabel=bs?`${bs.w}kg`:'-';

  let h=`<div class="ex-card${exDone?' done':''}${isExpanded?' expanded':''}" id="exc-${ex.key}">
    <div class="ex-hdr" onclick="toggleEx('${ex.key}')">
      <div class="ex-cb" onclick="event.stopPropagation();toggleExDone('${ex.key}')">
        <svg class="ex-cb-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">${ex.sets}×${ex.reps} · ${REST[ex.key]||'90 sec'} rest</div>
      </div>`;

  if(!ex.noW){
    h+=`<div class="ex-prev"><div class="ex-prev-val">${prevLabel}</div><div class="ex-prev-lbl">last time</div></div>`;
  } else {
    h+=`<div class="ex-prev"><div class="ex-prev-val" style="font-size:12px;color:var(--muted)">${ex.label||ex.unit}</div></div>`;
  }
  h+=`<div class="ex-chev">▼</div></div>`;

  // Expanded body
  if(isExpanded && !ex.noW){
    h+=`<div class="ex-body">`;
    if(prev){
      const prevSetsStr=prev.sets.map(s=>`${s.w}×${s.r}`).join(' · ');
      h+=`<div class="prev-hint"><strong>Last time (${fmtDate(prev.date)}):</strong> ${prevSetsStr}</div>`;
    }
    // Set rows — use today's sets if exist, else seed from prev or default
    let setsToShow=todaySets.length>0?todaySets:(prev&&prev.sets.length>0?prev.sets.map(s=>({w:s.w,r:s.r})):[{w:ex.dw,r:parseInt(ex.reps)||8}]);
    setsToShow.forEach((s,i)=>{
      h+=`<div class="set-row" id="sr-${ex.key}-${i}">
        <div class="set-num">${i+1}</div>
        <input class="set-w-input" type="number" inputmode="decimal" step="0.5" min="0" value="${s.w}" 
          onchange="updateSet('${ex.key}',${i},'w',this.value)" onblur="updateSet('${ex.key}',${i},'w',this.value)" placeholder="${ex.dw}">
        <div class="set-x">×</div>
        <input class="set-r-input" type="number" inputmode="numeric" step="1" min="0" value="${s.r}"
          onchange="updateSet('${ex.key}',${i},'r',this.value)" onblur="updateSet('${ex.key}',${i},'r',this.value)" placeholder="${ex.reps}">
        <div class="set-kg">${ex.unit}</div>
        <button class="set-del" onclick="delSet('${ex.key}',${i})">×</button>
      </div>`;
    });
    h+=`<button class="add-set-btn" onclick="addSet('${ex.key}')">+ Add set</button>
    <button class="ex-mark-btn ${exDone?'unmark':'mark'}" onclick="toggleExDone('${ex.key}')">
      ${exDone?'✓ Done — tap to undo':'Mark this exercise done'}
    </button>
    </div>`;
  } else if(isExpanded && ex.noW){
    h+=`<div class="ex-body"><div style="font-size:13px;color:var(--muted);padding:8px 0">No weight to track for this exercise.</div>
    <button class="ex-mark-btn ${exDone?'unmark':'mark'}" onclick="toggleExDone('${ex.key}')">
      ${exDone?'✓ Done — tap to undo':'Mark done'}
    </button></div>`;
  }

  h+=`</div>`;
  return h;
}

function toggleEx(key){
  expandedEx = expandedEx===key ? null : key;
  renderToday();
  // Scroll to card
  setTimeout(()=>{
    const el=document.getElementById('exc-'+key);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}

function toggleExDone(key){
  const k=dStr()+'_'+key;
  L.exdone[k]=!L.exdone[k];
  save('exdone');
  // Save current sets if not already saved
  const todayS=dStr();
  const existing=getSets(todayS,key);
  if(!existing||existing.length===0){
    const sess=Object.values(SESSIONS).find(s=>s.exercises.find(e=>e.key===key));
    const ex=sess?sess.exercises.find(e=>e.key===key):null;
    if(ex&&!ex.noW) setSets(todayS,key,[{w:ex.dw,r:parseInt(ex.reps)||8}]);
  }
  renderToday();
}

function updateSet(key,idx,field,val){
  const todayS=dStr();
  const ex=findEx(key);
  let sets=getSets(todayS,key)||[];
  const prev=getPrevSets(key);
  // If no sets yet, seed
  if(sets.length===0){
    if(prev&&prev.sets.length) sets=prev.sets.map(s=>({w:s.w,r:s.r}));
    else sets=[{w:ex?ex.dw:0,r:ex?parseInt(ex.reps)||8:8}];
  }
  if(!sets[idx]) sets[idx]={w:0,r:0};
  sets[idx][field]=parseFloat(val)||0;
  setSets(todayS,key,sets);
}

function addSet(key){
  const todayS=dStr();
  const ex=findEx(key);
  let sets=getSets(todayS,key)||[];
  const prev=getPrevSets(key);
  if(sets.length===0&&prev&&prev.sets.length) sets=prev.sets.map(s=>({w:s.w,r:s.r}));
  const last=sets.length?sets[sets.length-1]:{w:ex?ex.dw:0,r:ex?parseInt(ex.reps)||8:8};
  sets.push({w:last.w,r:last.r});
  setSets(todayS,key,sets);
  renderToday();
}

function delSet(key,idx){
  const todayS=dStr();
  let sets=getSets(todayS,key)||[];
  if(sets.length<=1){toast('Need at least 1 set');return;}
  sets.splice(idx,1);
  setSets(todayS,key,sets);
  renderToday();
}

function markSessionDone(){
  const id=getTodaySessId();
  if(!id) return;
  L.done[id]=true;
  save('done');
  // Auto-mark all exercises done
  const sk=getTodaySessionKey();
  const sess=SESSIONS[sk];
  if(sess) sess.exercises.forEach(ex=>{ L.exdone[dStr()+'_'+ex.key]=true; });
  save('exdone');
  toast('Session logged ✓');
  expandedEx=null;
  renderToday();
}

function findEx(key){
  for(const s of Object.values(SESSIONS)){
    const ex=s.exercises.find(e=>e.key===key);
    if(ex) return ex;
  }
  return null;
}

function buildLiftHistory(key){
  const lift=TRACKED_LIFTS.find(l=>l.key===key);
  if(!lift) return '';
  const wk=weekNum();

  // Gather all dates with data for this key
  const rows=[];
  for(let w=1;w<=7;w++){
    const wStart=new Date(PROG_START); wStart.setDate(wStart.getDate()+(w-1)*7);
    // Find session day for this lift
    const sessKey=Object.keys(SESSIONS).find(sk=>SESSIONS[sk].exercises.find(e=>e.key===key));
    if(!sessKey) continue;
    const sess=SESSIONS[sessKey];
    // Find the day of week for this session
    const sessDoW=Object.entries(DAY_MAP).find(([,v])=>v===sessKey);
    if(!sessDoW) continue;
    const dowNum=parseInt(sessDoW[0]);
    // Calculate actual date for this session in this week
    const startDow=1; // Monday
    const offset=(dowNum-startDow+7)%7;
    const sessDate=new Date(wStart); sessDate.setDate(wStart.getDate()+offset);
    const ds=dStr(sessDate);
    const sets=getSets(ds,key);
    const bs=sets?bestSet(sets):null;
    rows.push({week:w,date:ds,sets,best:bs,isCur:w===wk});
  }

  // PRs: highest weight ever logged
  let prWeight=-1;
  rows.forEach(r=>{ if(r.best&&r.best.w>prWeight) prWeight=r.best.w; });

  let h=`<div class="lift-hist-tbl">
    <div class="lh-hdr">
      <span>Week</span><span>Date</span><span>Best set</span><span>Top wt</span>
    </div>`;
  rows.forEach(r=>{
    const bestStr=r.best?`${r.best.w}×${r.best.r}`:'—';
    const topWt=r.best?r.best.w:'—';
    const isPR=r.best&&r.best.w===prWeight&&prWeight>lift.start;
    h+=`<div class="lh-row${r.isCur?' this-wk':''}">
      <span>W${r.week}</span>
      <span>${fmtDate(r.date)}</span>
      <span class="lh-best">${bestStr}${isPR?'<span class="pr-dot"></span>':''}</span>
      <span style="font-size:12px;color:${r.best?'var(--accent)':'var(--muted)'}">${topWt}${r.best?'kg':''}</span>
    </div>`;
  });
  h+=`</div>`;

  // Progress bar
  const curBest=rows.filter(r=>r.best).map(r=>r.best.w).reduce((a,b)=>Math.max(a,b),lift.start);
  const pct=Math.min(100,Math.max(0,((curBest-lift.start)/(lift.target-lift.start))*100));
  h+=`<div class="card" style="margin-top:10px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px">
      <span>${lift.name}</span><span>Target: ${lift.target}kg</span>
    </div>
    <div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden">
      <div style="height:4px;background:linear-gradient(90deg,#555,var(--accent));border-radius:2px;width:${pct}%;transition:width .4s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px">
      <span>Start: ${lift.start}kg</span>
      <span style="color:var(--accent)">${curBest}kg now</span>
    </div>
  </div>`;

  return h;
}

function drawBWChart(entries){
  const canvas=document.getElementById('bwChart');
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth*dpr, H=canvas.offsetHeight*dpr;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const vals=entries.map(([,v])=>v);
  const minV=Math.min(...vals)-0.5, maxV=Math.max(...vals)+0.5;
  const pad={l:36,r:16,t:10,b:24};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1;
  for(let i=0;i<=3;i++){
    const y=pad.t+(cH/3)*i;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
    const v=maxV-((maxV-minV)/3)*i;
    ctx.fillStyle='#555'; ctx.font=`${18*dpr/2}px DM Sans`; ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),pad.l-6,y+5);
  }
  const n=entries.length;
  const xOf=i=>pad.l+(i/(n-1))*cW;
  const yOf=v=>pad.t+cH-((v-minV)/(maxV-minV))*cH;
  // Line
  ctx.strokeStyle='#e8ff57'; ctx.lineWidth=2.5*dpr/2;
  ctx.shadowColor='#e8ff57'; ctx.shadowBlur=8;
  ctx.beginPath();
  entries.forEach(([,v],i)=>{ i===0?ctx.moveTo(xOf(i),yOf(v)):ctx.lineTo(xOf(i),yOf(v)); });
  ctx.stroke(); ctx.shadowBlur=0;
  // Dots
  entries.forEach(([ds,v],i)=>{
    ctx.fillStyle='#e8ff57'; ctx.beginPath(); ctx.arc(xOf(i),yOf(v),4*dpr/2,0,Math.PI*2); ctx.fill();
  });
}

function goPage(p){

}

let toastT;
function toast(msg){

}
