<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Master Plan">
<meta name="theme-color" content="#090909">
<title>Master Plan</title>
<style>
:root{
  --bg:#090909;--bg2:#111;--bg3:#181818;--bg4:#202020;
  --border:#222;--border2:#2a2a2a;
  --accent:#e8ff57;--blue:#57d8ff;--orange:#ff7b57;
  --green:#4aff7a;--purple:#c157ff;--gold:#ffaa00;--red:#ff5757;
  --text:#f0f0f0;--text2:#aaa;--muted:#666;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.inner{padding:0 16px 28px;max-width:600px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* NAV */
.nav{display:grid;grid-template-columns:1fr 1fr;background:#0d0d0d;border-top:1px solid var(--border);padding-bottom:var(--safe-b);flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--muted);min-height:56px;transition:color .15s;font-family:inherit}
.nb.active{color:var(--accent)}
.nb svg{width:20px;height:20px;margin-bottom:3px}
.nb-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase}

/* SHARED */
.page-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:40px;letter-spacing:3px;padding-top:20px;margin-bottom:4px}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin:20px 0 10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid}
.tag-push{color:var(--accent);border-color:var(--accent);background:#1a1f0a}
.tag-pull{color:var(--blue);border-color:var(--blue);background:#0d1a1a}
.tag-squat{color:var(--purple);border-color:var(--purple);background:#1a0d1f}
.tag-hinge{color:var(--orange);border-color:var(--orange);background:#1a0d0a}
.tag-opt{color:var(--gold);border-color:var(--gold);background:#1a1500}
.pill{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--text2);letter-spacing:1px}
.pill em{color:var(--accent);font-style:normal;font-weight:600}

/* TODAY */
.today-top{display:flex;justify-content:space-between;align-items:flex-start;padding-top:18px;margin-bottom:8px}
.t-day{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.t-date{font-size:12px;color:var(--text2)}
.s-name{font-family:Impact,'Arial Narrow',sans-serif;font-size:56px;letter-spacing:3px;line-height:1;margin:6px 0 4px}
.s-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.s-dur{font-size:12px;color:var(--muted)}
.s-done-badge{font-size:12px;color:var(--green);font-weight:600}

.warmup-bar{background:#0a1515;border:1px solid #1a3535;border-left:3px solid var(--blue);border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:12px;color:#6aafaf;line-height:1.7}
.warmup-bar strong{color:var(--blue);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;font-weight:600}

.pu-card{background:#141a08;border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.pu-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
.pu-val{font-family:Impact,'Arial Narrow',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);line-height:1}
.pu-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* RDL WARNING */
.rdl-warn{background:#1a0d00;border:1px solid var(--orange);border-left:3px solid var(--orange);border-radius:10px;padding:12px 16px;margin-bottom:8px;font-size:12px;color:#c87a40;line-height:1.7}
.rdl-warn strong{color:var(--orange);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;font-weight:600}

/* EXERCISE CARDS */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.ex-card.done{border-color:#1e3a1a;background:#0c140a}
.ex-card.expanded{border-color:var(--accent)}
.ex-card.rdl-card{border-color:#2a1a0a}
.ex-hdr{display:flex;align-items:center;padding:12px 14px;gap:11px;cursor:pointer;user-select:none}
.ex-hdr:active{background:var(--bg3)}
.ex-cb{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ex-card.done .ex-cb{background:var(--accent);border-color:var(--accent)}
.ex-cb-icon{display:none}
.ex-card.done .ex-cb-icon{display:block}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-card.done .ex-name{color:var(--muted);text-decoration:line-through}
.ex-meta{font-size:11px;color:var(--muted);margin-top:1px}
.ex-prev{text-align:right;flex-shrink:0;min-width:52px}
.ex-prev-val{font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;color:var(--text2);line-height:1}
.ex-prev-lbl{font-size:9px;color:var(--muted);letter-spacing:1px}
.ex-chev{color:var(--muted);font-size:12px;flex-shrink:0;transition:transform .2s;margin-left:4px}
.ex-card.expanded .ex-chev{transform:rotate(180deg);color:var(--accent)}

/* SET LOGGER */
.ex-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.ex-card.expanded .ex-body{display:block}
.prev-hint{font-size:11px;color:var(--muted);background:var(--bg3);border-radius:6px;padding:7px 10px;margin-bottom:10px;line-height:1.5}
.prev-hint strong{color:var(--text2)}
.target-hint{font-size:11px;color:var(--accent);background:#141a08;border-radius:6px;padding:7px 10px;margin-bottom:10px;line-height:1.5;border:1px solid #2a3a14}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.set-num{font-size:11px;color:var(--muted);width:24px;flex-shrink:0;text-align:center}
.set-w{flex:1.3;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 4px;font-family:Impact,'Arial Narrow',sans-serif;font-size:20px;color:var(--accent);text-align:center;outline:none;-webkit-appearance:none;appearance:none;min-width:0;transition:border-color .15s}
.set-r{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 4px;font-family:Impact,'Arial Narrow',sans-serif;font-size:20px;color:var(--text2);text-align:center;outline:none;-webkit-appearance:none;appearance:none;min-width:0;transition:border-color .15s}
.set-w:focus,.set-r:focus{border-color:var(--accent)}
.set-x{font-size:14px;color:var(--muted);flex-shrink:0}
.set-kg{font-size:10px;color:var(--muted);flex-shrink:0;width:28px}
.set-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.set-del:active{color:var(--red);border-color:var(--red)}
.add-set-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;font-family:inherit}
.add-set-btn:active{border-color:var(--accent);color:var(--accent)}
.ex-mark-btn{width:100%;padding:11px;border-radius:8px;border:none;font-family:Impact,'Arial Narrow',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;margin-top:10px}
.ex-mark-btn:active{opacity:.8}
.ex-mark-btn.mark{background:var(--accent);color:#000}
.ex-mark-btn.unmark{background:#1a2a14;color:var(--accent);border:1px solid var(--accent)}

.session-btn{width:100%;padding:18px;border-radius:14px;font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;border:none;margin-top:14px}
.session-btn:active{opacity:.8}
.session-btn.go{background:var(--accent);color:#000}
.session-btn.logged{background:#1a2a14;color:var(--accent);border:1px solid var(--accent)}

.big-state{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px 20px;text-align:center;margin:16px 0}
.bs-icon{font-size:52px;margin-bottom:12px}
.bs-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:38px;letter-spacing:3px}
.bs-title.blue{color:var(--blue)}.bs-title.dim{color:var(--muted)}
.bs-sub{font-size:13px;color:var(--text2);margin-top:10px;line-height:1.7}

/* PROGRESS BAR */
.mini-progress{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.mp-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px}
.mp-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.mp-fill{height:3px;background:linear-gradient(90deg,#555,var(--accent));border-radius:2px;transition:width .4s}

/* PLAN TAB */
.prog-block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.prog-hdr{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.prog-hdr:active{background:var(--bg3)}
.prog-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px}
.prog-sub-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.prog-hdr-r{display:flex;align-items:center;gap:10px}
.chev{color:var(--muted);font-size:13px;transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.prog-body{display:none;border-top:1px solid var(--border)}
.prog-body.open{display:block}
.prog-wb{padding:10px 16px;font-size:11px;line-height:1.6;border-bottom:1px solid var(--border)}
.prog-wb.blue{background:#081414;color:#5a9a9a}
.prog-wb.dim{background:#0d0d0d;color:var(--muted)}

/* EXERCISE ROWS IN PLAN */
.plan-ex{border-bottom:1px solid #131313;overflow:hidden}
.plan-ex:last-child{border-bottom:none}
.plan-ex-hdr{display:flex;align-items:center;padding:11px 16px;gap:10px;cursor:pointer;user-select:none}
.plan-ex-hdr:active{background:var(--bg3)}
.plan-ex-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.plan-ex-sets{font-size:11px;color:var(--blue);flex-shrink:0}
.plan-ex-w{font-family:Impact,'Arial Narrow',sans-serif;font-size:15px;color:var(--accent);flex-shrink:0;min-width:52px;text-align:right;letter-spacing:1px}
.plan-ex-chev{color:var(--muted);font-size:11px;flex-shrink:0;transition:transform .2s;margin-left:6px}
.plan-ex.cue-open .plan-ex-chev{transform:rotate(180deg)}
.plan-cue{display:none;padding:12px 16px;background:#0d0d0d;border-top:1px solid #131313}
.plan-ex.cue-open .plan-cue{display:block}
.cue-section{margin-bottom:10px}
.cue-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:6px;font-weight:600}
.cue-list{list-style:none;padding:0}
.cue-list li{font-size:12px;color:var(--text2);padding:3px 0;padding-left:14px;position:relative;line-height:1.5}
.cue-list li::before{content:'→';position:absolute;left:0;color:var(--muted);font-size:11px}
.cue-warn{font-size:11px;color:var(--orange);background:#1a0d00;border-radius:6px;padding:8px 10px;margin-top:6px;line-height:1.5;border:1px solid #3a1a00}

/* PULL-UP TABLE */
.pu-table{width:100%;border-collapse:collapse}
.pu-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 16px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.pu-table td{padding:9px 16px;border-bottom:1px solid #131313;font-size:12px;color:var(--text2)}
.pu-table tr:last-child td{border-bottom:none}
.pu-table td:first-child{color:var(--text);font-weight:500}
.pu-table .cur-wk td{background:#141a08;color:var(--accent)}
.pu-table .cur-wk td:first-child{color:var(--accent)}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--accent);color:#000;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="scroll" id="scroll">
    <div class="page active" id="page-today"><div class="inner" id="today-inner"></div></div>
    <div class="page" id="page-plan"><div class="inner" id="plan-inner"></div></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="goPage('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="nb-lbl">Today</span>
    </button>
    <button class="nb" onclick="goPage('plan')" id="nav-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span class="nb-lbl">Plan</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// PROGRAMME — WEEK 2
// ══════════════════════════════════════════════
const PROG_START = new Date('2026-05-11T00:00:00');

const PULLUPS = [
  {main:'1×2',band:'+3×5 band'},{main:'2×2 + 2×5 band',band:'thinner band ← YOU ARE HERE'},
  {main:'2×3',band:'+2×5 band'},{main:'3×3',band:'+1×5 band'},
  {main:'3×4',band:'+1×4 band'},{main:'4×4',band:'no band'},
  {main:'4×6+',band:'✓ goal'}
];

const REST = {
  bench:'2–3 min',incline:'90 sec',ohp:'2 min',cablefly:'90 sec',
  lateral:'60 sec',pushdown:'90 sec',
  squat:'2–3 min',rdl:'2 min',backext:'90 sec',nordic:'2 min',legext:'90 sec',calf:'60 sec',
  row:'2–3 min',pullup:'2 min',incrow:'90 sec',facepull:'60 sec',curl:'90 sec',
  deadlift:'3 min',legpress:'2 min',hipthrust:'90 sec',wlunge:'90 sec',legraise:'60 sec',
  bonusfly:'90 sec',bonuscurl:'90 sec',bonuslat:'60 sec',bonuslr:'60 sec'
};

// Form cues per exercise
const CUES = {
  bench:{
    feel:'Chest stretch at the bottom, chest squeeze at the top — not shoulders.',
    do:['Arch your upper back slightly, shoulder blades squeezed together and down','Bar touches low chest, not collarbone','Drive your feet into the floor throughout','Elbows at ~45° — not flared out wide'],
    avoid:['Bouncing the bar off your chest','Letting your bum leave the bench','Bar drifting toward your face on the way up'],
  },
  incline:{
    feel:'Upper chest and front shoulder — if you feel it in your lower chest the angle is too flat.',
    do:['Set bench to 30–45° — lower is better for chest, higher hits more shoulder','Control the descent — 2 seconds down','DBs travel in a slight arc, not straight up and down','Full stretch at the bottom'],
    avoid:['Going too heavy — this is an accessory, not a max lift','Letting elbows flare behind your torso at the bottom'],
  },
  ohp:{
    feel:'Shoulders burning, not neck or traps.',
    do:['Stand or sit — brace your core hard','Bar (or DBs) at shoulder height to start','Press straight up, slight backward lean is fine','Full lockout at the top'],
    avoid:['Shrugging your traps as you press','Using your legs to cheat the weight up','Leaning so far back it becomes an incline press'],
  },
  cablefly:{
    feel:'Chest stretch when arms are wide — if you feel bicep you need to bend your elbows more.',
    do:['Slight forward lean from the hips','Soft bend in the elbows — keep it throughout','Bring hands together like you are hugging a tree','Slow and controlled — especially on the way out'],
    avoid:['Straightening your arms completely — shoulder injury risk','Using momentum and swinging the weights'],
  },
  lateral:{
    feel:'Side of the shoulder — medial delt. Not the traps.',
    do:['Slight forward lean helps isolate the medial delt','Lead with your elbows, not your hands','Stop at shoulder height — going higher recruits traps','Slow lower — 2–3 seconds down'],
    avoid:['Swinging the weights up with momentum','Shrugging — if your traps are firing the weight is too heavy'],
  },
  pushdown:{
    feel:'Tricep — the back of your arm. Elbows stay pinned to your sides.',
    do:['Elbows tucked tight to your ribs throughout','Full extension at the bottom — squeeze the tricep','Let the cable pull your forearms back slowly — full stretch'],
    avoid:['Letting your elbows drift forward as you push down','Using your body weight to push the stack'],
  },
  squat:{
    feel:'Quads and glutes doing the work — not lower back.',
    do:['Bar on upper traps — not your neck','Feet shoulder-width, toes out slightly — find what feels natural','Knees track over your toes throughout the movement','Hit parallel or below — hip crease below knee','Brace hard before you unrack and keep it throughout'],
    avoid:['Letting your knees cave inward','Good morning squat — chest dropping forward as you stand','Heels coming off the floor — widen stance or elevate heels'],
    warn:'At 60kg you are already past the original June 24 target. Pick ONE weight and hit all 4×8 at that weight. No ramping.'
  },
  rdl:{
    feel:'Hamstring stretch — a pull behind your knee and up your thigh. Not your lower back.',
    do:['Bar stays dragging down your shins and thighs the entire movement — this is the key','Soft bend in the knees — not a squat, not a stiff leg','Hinge at the hips — push your bum back behind you','Stop when you feel the hamstring stretch — usually shin height','Drive your hips forward to stand — squeeze glutes at the top','Neutral spine throughout — no rounding'],
    avoid:['Letting the bar drift even 5cm away from your legs — lower back takes over immediately','Rounding your lower back at the bottom','Going so low you lose the spine position'],
    warn:'Back complained at 50kg last time. Try 40kg this week with perfect form. Bar glued to your legs the whole way. If back complains again — stop, film it, bring the video.'
  },
  backext:{
    feel:'Glutes and lower back — a contraction at the top, not a stretch.',
    do:['Hips at the pad edge, not your stomach','Start from a flat/neutral spine position','Drive up by squeezing your glutes — not by throwing your torso','Stop at parallel to the floor — do not hyperextend'],
    avoid:['Hyperextending at the top — puts compression on your lumbar','Using momentum — slow and controlled'],
  },
  nordic:{
    feel:'Hamstring — an intense burning eccentric as you lower down.',
    do:['Anchor your feet securely under the pad or bar','Body is completely straight — do not bend at the hips','Lower yourself as slowly as possible — this is the work','Use your hands to catch yourself at the bottom','Pull yourself back up with hamstrings as much as possible'],
    avoid:['Going too fast on the way down — the slow lowering is the entire point','Bending at the hips — you are not a jackknife'],
    warn:'These are brutal. 3×3–5 reps is enough to start. You will feel this in your hamstrings for 2–3 days after the first session.'
  },
  legext:{
    feel:'Front of the quad — directly below your knee going up.',
    do:['Full extension at the top — squeeze quad hard','Control the descent — 2 seconds down','Toes pointed slightly outward works for most people'],
    avoid:['Using momentum — swinging the weight up','Stopping short of full extension'],
  },
  calf:{
    feel:'Calf belly — the meatiest part of your lower leg.',
    do:['Full range — all the way down to a stretch, all the way up to tiptoe','Pause at the top and squeeze','Go slow — calves respond to time under tension'],
    avoid:['Bouncing at the bottom — take the stretch slowly','Partial reps — calves are stubborn and need full range'],
  },
  row:{
    feel:'Mid back and lats — not your biceps doing all the work.',
    do:['Chest on the pad (if using chest-supported) or brace your core hard','Pull the bar to your lower sternum — not your chest or stomach','Elbows drive back and slightly up','Squeeze your shoulder blades together at the top'],
    avoid:['Letting your elbows flare out wide — becomes a shrug','Using momentum — the bar should not swing','Half reps — full stretch at the bottom'],
  },
  pullup:{
    feel:'Lats — the muscles under your armpits pulling you up.',
    do:['Dead hang at the bottom — full arm extension','Chin clears the bar at the top — every rep','Think about pulling your elbows to your hips','Stop 1–2 reps before failure — do not grind to absolute fail'],
    avoid:['Kipping or swinging your legs for momentum','Partial reps — chin must clear the bar','Going to failure — ruins the next set'],
    warn:'Week 2 target: 2×2 unassisted then 2×5 banded with a THINNER band than last week. You did 2 unassisted + 3×8 banded in week 1. Push the unassisted sets first when you are freshest.'
  },
  incrow:{
    feel:'Mid back — between your shoulder blades.',
    do:['Chest on a 45° incline bench','Let the DBs hang fully at the bottom — full stretch','Drive your elbows up and back','Squeeze at the top for a full second'],
    avoid:['Swinging or using momentum','Shrugging your traps as you pull'],
  },
  facepull:{
    feel:'Rear delts and upper traps — the back of your shoulders.',
    do:['Cable at or just above head height','Pull toward your face — hands end up beside your ears','Elbows high and wide — lead with your elbows','External rotation at the end — thumbs back'],
    avoid:['Pulling too heavy — this is a health exercise, not a strength exercise','Letting your elbows drop below shoulder height'],
  },

function dStr(d){d=d||new Date();return d.toISOString().split('T')[0];}
function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function weekNum(){
  const t=today(),s=new Date(PROG_START);s.setHours(0,0,0,0);
  if(t<s)return 0;
  return Math.min(Math.floor((t-s)/86400000/7)+1,7);
}
function getDow(){return new Date().getDay();}
function getSessionKey(){return DAY_MAP[getDow()]||null;}
function todaySessId(){const sk=getSessionKey();return sk?dStr()+'_'+sk:null;}
function isSessDone(){const id=todaySessId();return id?!!L.done[id]:false;}
function isExDone(key){return!!L.exdone[dStr()+'_'+key];}
function getSets(ds,key){return(L.logs[ds]&&L.logs[ds][key])?L.logs[ds][key]:null;}
function setSets(ds,key,sets){if(!L.logs[ds])L.logs[ds]={};L.logs[ds][key]=sets;save('logs');}

function getPrev(key){
  const ts=dStr();
  const dates=Object.keys(L.logs).filter(d=>d<ts).sort().reverse();
  for(const d of dates){if(L.logs[d][key]&&L.logs[d][key].length>0)return{date:d,sets:L.logs[d][key]};}
  return null;
}
function bestSet(sets){if(!sets||!sets.length)return null;return sets.reduce((b,s)=>(s.w>b.w||(s.w===b.w&&s.r>b.r))?s:b,sets[0]);}
function fmtDate(ds){const d=new Date(ds+'T00:00:00');const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+m[d.getMonth()];}
function findEx(key){for(const s of Object.values(SESSIONS)){const e=s.exercises.find(x=>x.key===key);if(e)return e;}return null;}

function bigState(icon,title,cls,sub){
  return`<div class="big-state"><div class="bs-icon">${icon}</div><div class="bs-title ${cls}">${title}</div><div class="bs-sub">${sub}</div></div>`;
}

function buildExCard(ex){
  const ts=dStr(),exDone=isExDone(ex.key),isExp=expandedEx===ex.key;
  const prev=getPrev(ex.key);
  const todaySets=getSets(ts,ex.key)||[];
  const bs=prev?bestSet(prev.sets):null;
  const prevLabel=bs?`${bs.w}kg`:ex.noW?(ex.label||'-'):'-';

  let h=`<div class="ex-card${exDone?' done':''}${isExp?' expanded':''}${ex.rdl?' rdl-card':''}" id="exc-${ex.key}">
    <div class="ex-hdr" onclick="toggleEx('${ex.key}')">
      <div class="ex-cb" onclick="event.stopPropagation();toggleExDone('${ex.key}')">
        <svg class="ex-cb-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}${ex.rdl?` <span style="font-size:10px;color:var(--orange)">⚠ form focus</span>`:''}</div>
        <div class="ex-meta">${ex.sets}×${ex.reps} · ${REST[ex.key]||'90 sec'} rest</div>
      </div>
      <div class="ex-prev">
        <div class="ex-prev-val">${prevLabel}</div>
        <div class="ex-prev-lbl">${bs||ex.noW?'last time':'—'}</div>
      </div>
      <div class="ex-chev">▼</div>
    </div>`;

  if(isExp){
    h+=`<div class="ex-body">`;
    if(prev&&!ex.noW){
      const prevStr=prev.sets.map(s=>`${s.w}×${s.r}`).join(' · ');
      h+=`<div class="prev-hint"><strong>Last time (${fmtDate(prev.date)}):</strong> ${prevStr}</div>`;
    }
    if(!ex.noW){
      const target=`${ex.sets}×${ex.reps} @ ${ex.dw}${ex.unit}`;
      h+=`<div class="target-hint">Target this week: ${target}</div>`;
      let setsToShow=todaySets.length>0?todaySets:(prev&&prev.sets.length?prev.sets.map(s=>({w:s.w,r:s.r})):[{w:ex.dw,r:parseInt(ex.reps)||8}]);
      setsToShow.forEach((s,i)=>{
        h+=`<div class="set-row">
          <div class="set-num">${i+1}</div>
          <input class="set-w" type="number" inputmode="decimal" step="0.5" min="0" value="${s.w}"
            onchange="updSet('${ex.key}',${i},'w',this.value)" onblur="updSet('${ex.key}',${i},'w',this.value)">
          <div class="set-x">×</div>
          <input class="set-r" type="number" inputmode="numeric" step="1" min="0" value="${s.r}"
            onchange="updSet('${ex.key}',${i},'r',this.value)" onblur="updSet('${ex.key}',${i},'r',this.value)">
          <div class="set-kg">${ex.unit}</div>
          <button class="set-del" onclick="delSet('${ex.key}',${i})">×</button>
        </div>`;
      });
      h+=`<button class="add-set-btn" onclick="addSet('${ex.key}')">+ Add set</button>`;
    } else {
      h+=`<div style="font-size:13px;color:var(--muted);padding:4px 0 10px">Bodyweight — mark done when complete.</div>`;
    }
    h+=`<button class="ex-mark-btn ${exDone?'unmark':'mark'}" onclick="toggleExDone('${ex.key}')">
      ${exDone?'✓ Done — tap to undo':'Mark done'}
    </button></div>`;
  }
  h+=`</div>`;
  return h;
}

function toggleEx(key){
  expandedEx=expandedEx===key?null:key;
  renderToday();
  setTimeout(()=>{const el=document.getElementById('exc-'+key);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}

function toggleExDone(key){
  const k=dStr()+'_'+key;
  L.exdone[k]=!L.exdone[k];
  save('exdone');
  const ex=findEx(key);
  if(ex&&!ex.noW){
    const ts=dStr();
    if(!getSets(ts,key)||!getSets(ts,key).length){
      setSets(ts,key,[{w:ex.dw,r:parseInt(ex.reps)||8}]);
    }
  }
  renderToday();
}

function updSet(key,idx,field,val){
  const ts=dStr(),ex=findEx(key);
  let sets=getSets(ts,key)||[];
  if(!sets.length){
    const prev=getPrev(key);
    if(prev&&prev.sets.length)sets=prev.sets.map(s=>({w:s.w,r:s.r}));
    else sets=[{w:ex?ex.dw:0,r:ex?parseInt(ex.reps)||8:8}];
  }
  if(!sets[idx])sets[idx]={w:0,r:0};
  sets[idx][field]=parseFloat(val)||0;
  setSets(ts,key,sets);
}

function addSet(key){
  const ts=dStr(),ex=findEx(key);
  let sets=getSets(ts,key)||[];
  const prev=getPrev(key);
  if(!sets.length&&prev&&prev.sets.length)sets=prev.sets.map(s=>({w:s.w,r:s.r}));
  const last=sets.length?sets[sets.length-1]:{w:ex?ex.dw:0,r:ex?parseInt(ex.reps)||8:8};
  sets.push({w:last.w,r:last.r});
  setSets(ts,key,sets);
  renderToday();
}

function delSet(key,idx){
  const ts=dStr();
  let sets=getSets(ts,key)||[];
  if(sets.length<=1){toast('Need at least 1 set');return;}
  sets.splice(idx,1);
  setSets(ts,key,sets);
  renderToday();
}

function markDone(){
  const id=todaySessId(),sk=getSessionKey();
  if(!id)return;
  L.done[id]=true;
  save('done');
  if(SESSIONS[sk])SESSIONS[sk].exercises.forEach(ex=>{L.exdone[dStr()+'_'+ex.key]=true;});
  save('exdone');
  toast('Session logged ✓');
  expandedEx=null;
  renderToday();
}

    if(s.warmup){
      h+=`<div class="prog-wb blue">🚣 Row 5 min · Band pull-apart ×20 · Dislocate ×10 · Face pull ×15</div>`;
    } else {
      h+=`<div class="prog-wb dim">🚣 5 min easy row (18–20 SPM)</div>`;
    }
    if(s.pullups){
      h+=`<div class="prog-wb" style="background:#141a08;color:var(--accent)">💪 Pull-ups: 2×2 unassisted → 2×5 banded (thinner band than last week)</div>`;
    }

    s.exercises.forEach(ex=>{
      const w=ex.noW?(ex.label||'-'):`${ex.dw}${ex.unit}`;
      const cue=CUES[ex.key];
      h+=`<div class="plan-ex" id="pe-${ex.key}">
        <div class="plan-ex-hdr" onclick="togCue('${ex.key}')">
          <div class="plan-ex-name">${ex.name}${ex.rdl?` <span style="font-size:10px;color:var(--orange)">⚠</span>`:''}</div>
          <div class="plan-ex-sets">${ex.sets}×${ex.reps}</div>
          <div class="plan-ex-w">${w}</div>
          ${cue?`<div class="plan-ex-chev">▼</div>`:''}
        </div>`;

      if(cue){
        h+=`<div class="plan-cue">
          <div class="cue-section">
            <div class="cue-title">Feel</div>
            <div style="font-size:12px;color:var(--text2);line-height:1.5">${cue.feel}</div>
          </div>`;
        if(cue.do&&cue.do.length){
          h+=`<div class="cue-section">
            <div class="cue-title">Do this</div>
            <ul class="cue-list">${cue.do.map(c=>`<li>${c}</li>`).join('')}</ul>
          </div>`;
        }
        if(cue.avoid&&cue.avoid.length){
          h+=`<div class="cue-section">
            <div class="cue-title">Avoid</div>
            <ul class="cue-list">${cue.avoid.map(c=>`<li>${c}</li>`).join('')}</ul>
          </div>`;
        }
        if(cue.warn){
          h+=`<div class="cue-warn">⚠ ${cue.warn}</div>`;
        }
        h+=`<div style="font-size:11px;color:var(--muted);margin-top:8px">Rest: ${REST[ex.key]||'90 sec'}</div>`;
        h+=`</div>`;
      }
      h+=`</div>`;
    });

    // Strength target for main lifts
    if(['upperA','lowerA','lowerB'].includes(sk)){
      const mainLifts=s.exercises.filter(e=>TARGETS[e.key]);
      if(mainLifts.length){
        h+=`<div style="padding:12px 16px;background:#0d0d0d;border-top:1px solid var(--border)">`;
        mainLifts.forEach(ex=>{
          const t=TARGETS[ex.key];
          const prev=getPrev(ex.key);
          const bs=prev?bestSet(prev.sets):null;
          const cur=bs?bs.w:t.start;
          const pct=Math.min(100,Math.max(0,((cur-t.start)/(t.target-t.start))*100));
          h+=`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px">
              <span>${ex.name}</span><span style="color:var(--accent)">Target: ${t.target}kg</span>
            </div>
            <div style="height:3px;background:var(--bg2);border-radius:2px;overflow:hidden">
              <div style="height:3px;background:linear-gradient(90deg,#555,var(--accent));width:${pct}%;border-radius:2px"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px">
              <span>Start: ${t.start}kg</span><span style="color:var(--text2)">${cur}kg now</span>
            </div>
          </div>`;
        });
        h+=`</div>`;
      }
    }
    h+=`</div></div>`;
  });

  // Wednesday core
  h+=`<div class="sec-label">Wednesday — Home Core</div>
  <div class="prog-block">
    <div class="prog-hdr" onclick="togProg('pb-core','pc-core')">
      <div><div class="prog-title">CORE — Wednesday</div><div class="prog-sub-lbl">At home · 20 min · No equipment</div></div>
      <div class="prog-hdr-r"><span class="tag tag-pull" style="color:#4aff7a;border-color:#4aff7a;background:#0a180a">Core</span><span class="chev" id="pc-core">▼</span></div>
    </div>
    <div class="prog-body" id="pb-core">
      <div class="prog-wb dim">🚴 20 min easy cardio first — then go straight into core</div>
      <div class="plan-ex"><div class="plan-ex-hdr" onclick="this.parentElement.classList.toggle('cue-open')"><div class="plan-ex-name">Plank</div><div class="plan-ex-sets">3×45s</div><div class="plan-ex-w">BW</div><div class="plan-ex-chev">▼</div></div><div class="plan-cue"><div style="font-size:12px;color:var(--text2);line-height:1.5">Brace like you are about to take a punch. Hips level — not sagging, not piked. Breathe steadily.</div></div></div>
      <div class="plan-ex"><div class="plan-ex-hdr" onclick="this.parentElement.classList.toggle('cue-open')"><div class="plan-ex-name">Hollow Body Hold</div><div class="plan-ex-sets">3×30s</div><div class="plan-ex-w">BW</div><div class="plan-ex-chev">▼</div></div><div class="plan-cue"><div style="font-size:12px;color:var(--text2);line-height:1.5">Flat on back, press lower back into floor. Raise legs and shoulders slightly. Hold the tension. Most underrated core move — transfers directly to pull-ups.</div></div></div>
      <div class="plan-ex"><div class="plan-ex-hdr" onclick="this.parentElement.classList.toggle('cue-open')"><div class="plan-ex-name">Bicycle Crunches</div><div class="plan-ex-sets">3×20 each</div><div class="plan-ex-w">BW</div><div class="plan-ex-chev">▼</div></div><div class="plan-cue"><div style="font-size:12px;color:var(--text2);line-height:1.5">Slow — elbow to opposite knee with a full twist. Feel the oblique. These build the V-shape on your sides.</div></div></div>
      <div class="plan-ex"><div class="plan-ex-hdr" onclick="this.parentElement.classList.toggle('cue-open')"><div class="plan-ex-name">Lying Leg Raises</div><div class="plan-ex-sets">3×15</div><div class="plan-ex-w">BW</div><div class="plan-ex-chev">▼</div></div><div class="plan-cue"><div style="font-size:12px;color:var(--text2);line-height:1.5">Lower back glued to the floor. Lower legs slowly — stop before back arches. Builds toward hanging leg raises.</div></div></div>
      <div class="plan-ex" style="border-bottom:none"><div class="plan-ex-hdr" onclick="this.parentElement.classList.toggle('cue-open')"><div class="plan-ex-name">Dead Bug</div><div class="plan-ex-sets">3×10 each</div><div class="plan-ex-w">BW</div><div class="plan-ex-chev">▼</div></div><div class="plan-cue"><div style="font-size:12px;color:var(--text2);line-height:1.5">On back, arms up. Lower opposite arm and leg slowly. Lower back stays glued down. Go slow — that is the entire point. Directly helps deadlift stability.</div></div></div>
    </div>
  </div>`;

  // Pull-up progression table
  h+=`<div class="sec-label">Pull-Up Progression</div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="pu-table">
      <thead><tr><th>Week</th><th>Unassisted</th><th>Assisted</th></tr></thead>
      <tbody>`;
  PULLUPS.forEach((p,i)=>{
    const isCur=(i+1)===wk;
    h+=`<tr class="${isCur?'cur-wk':''}"><td>Wk ${i+1}</td><td>${p.main.split('+')[0].trim()}</td><td style="font-size:11px;color:var(--muted)">${p.band}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="card" style="border-left:3px solid var(--orange);margin-top:4px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:6px">Open Items</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.9">
      📹 Film a set of RDL this week<br>
      📹 Film a set of hip thrust — check for hyperextension<br>
      💪 Pull-ups — thinner band, push unassisted reps first<br>
      📐 Leg raises — strict hanging form or lying on floor
    </div>
  </div>`;

  el.innerHTML=h;
}

function togProg(bid,cid){
  const b=document.getElementById(bid),c=document.getElementById(cid);
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  if(c)c.classList.toggle('open',!open);
}

function togCue(key){
  const el=document.getElementById('pe-'+key);
  if(!el)return;
  el.classList.toggle('cue-open');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

const PAGES=['today','plan'];
function goPage(p){
  PAGES.forEach(pg=>{
    document.getElementById('page-'+pg).classList.toggle('active',pg===p);
    document.getElementById('nav-'+pg).classList.toggle('active',pg===p);
  });
  document.getElementById('scroll').scrollTop=0;
  if(p==='today'){expandedEx=null;renderToday();}
  if(p==='plan')renderPlan();
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
